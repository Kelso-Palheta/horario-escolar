<script>
// ====== STATE ======
let state = {
  currentSchoolId: null,
  schools: {},  // id -> {name, data}
  currentView: 'dashboard',
  editingSlot: null,
  theme: 'dark'
};

const HORARIOS = {
  1:'07:20-08:10', 2:'08:10-09:00', 3:'09:20-10:10', 4:'10:10-11:00', 5:'11:00-11:45',
  6:'13:15-14:00', 7:'14:00-14:45', 8:'15:00-15:45', 9:'15:45-16:30'
};

const AREA_MAP_CACHE = {};
function rebuildAreaMap() {
  Object.keys(AREA_MAP_CACHE).forEach(k => delete AREA_MAP_CACHE[k]);
  const d = currentData();
  for (const [area, discs] of Object.entries(d.areas)) {
    for (const di of discs) AREA_MAP_CACHE[di] = area;
  }
}
function getArea(disc) { return AREA_MAP_CACHE[disc] || 'Itinerário'; }

// ====== STORAGE ======
function loadFromStorage() {
  try {
    const s = localStorage.getItem('horario_escolar_schools');
    if (s) state.schools = JSON.parse(s);
    state.currentSchoolId = localStorage.getItem('horario_escolar_current') || null;
    state.theme = localStorage.getItem('horario_escolar_theme') || 'dark';
  } catch(e) { console.error(e); }
}
function saveToStorage() {
  localStorage.setItem('horario_escolar_schools', JSON.stringify(state.schools));
  if (state.currentSchoolId) localStorage.setItem('horario_escolar_current', state.currentSchoolId);
  localStorage.setItem('horario_escolar_theme', state.theme);
}

function currentData() {
  if (!state.currentSchoolId) return null;
  return state.schools[state.currentSchoolId]?.data || null;
}

function bootSchool() {
  if (Object.keys(state.schools).length === 0) {
    const id = 'escola_001';
    state.schools[id] = {
      name: 'Escola Ensino Médio Integral',
      data: JSON.parse(JSON.stringify(window.DEFAULT_DATA))
    };
    state.currentSchoolId = id;
    saveToStorage();
  } else if (!state.currentSchoolId || !state.schools[state.currentSchoolId]) {
    state.currentSchoolId = Object.keys(state.schools)[0];
  }
  rebuildAreaMap();
}

// ====== SCHOOL CRUD ======
function populateSchoolSelect() {
  const sel = document.getElementById('schoolSelect');
  sel.innerHTML = '';
  for (const [id, s] of Object.entries(state.schools)) {
    const opt = document.createElement('option');
    opt.value = id; opt.textContent = s.name;
    if (id === state.currentSchoolId) opt.selected = true;
    sel.appendChild(opt);
  }
}
function switchSchool() {
  state.currentSchoolId = document.getElementById('schoolSelect').value;
  saveToStorage();
  rebuildAreaMap();
  render();
}
function newSchool() {
  const name = prompt('Nome da nova escola:');
  if (!name) return;
  const id = 'escola_' + Date.now();
  state.schools[id] = {
    name,
    data: JSON.parse(JSON.stringify(window.DEFAULT_DATA))
  };
  state.currentSchoolId = id;
  saveToStorage();
  populateSchoolSelect();
  rebuildAreaMap();
  render();
  toast('Escola criada: ' + name);
}
function deleteSchool() {
  if (Object.keys(state.schools).length <= 1) { alert('Mantenha ao menos 1 escola.'); return; }
  if (!confirm('Apagar escola "' + state.schools[state.currentSchoolId].name + '"?')) return;
  delete state.schools[state.currentSchoolId];
  state.currentSchoolId = Object.keys(state.schools)[0];
  saveToStorage();
  populateSchoolSelect();
  rebuildAreaMap();
  render();
}

// ====== UTILS ======
function getSlot(dia, aula, turma) {
  const d = currentData();
  return d.slots.find(s => s.dia===dia && s.aula===aula && s.turma===turma);
}
function isPlanningOff(prof, dia, aula) {
  const list = currentData().planejamento[dia] || [];
  for (const p of list) {
    if (p.prof === prof) {
      if (p.periodo === 'all') return true;
      if (p.periodo === 'tarde' && aula >= 6) return true;
    }
  }
  return false;
}
function isProfBusyElsewhere(prof, dia, aula, exceptTurma) {
  return currentData().slots.some(s =>
    s.dia===dia && s.aula===aula && s.prof===prof && s.turma!==exceptTurma
  );
}
function detectConflicts() {
  const d = currentData(); const conflicts = [];
  const map = {};
  for (const s of d.slots) {
    const key = `${s.dia}|${s.aula}|${s.prof}`;
    if (!map[key]) map[key] = [];
    map[key].push(s);
  }
  for (const [k, ss] of Object.entries(map)) {
    if (ss.length > 1) conflicts.push({type:'prof', key:k, slots:ss});
  }
  for (const s of d.slots) {
    if (isPlanningOff(s.prof, s.dia, s.aula)) {
      conflicts.push({type:'planejamento', slot:s});
    }
  }
  return conflicts;
}

// ====== TOAST ======
function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2500);
}

// ====== THEME ======
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  saveToStorage();
}
function applyTheme() {
  const html = document.documentElement;
  if (state.theme === 'light') {
    html.classList.remove('dark'); html.classList.add('light');
    document.body.className = 'bg-surface-100 text-surface-900 transition-colors';
    document.getElementById('themeLabel').textContent = 'Modo escuro';
  } else {
    html.classList.remove('light'); html.classList.add('dark');
    document.body.className = 'bg-surface-950 text-surface-100 transition-colors';
    document.getElementById('themeLabel').textContent = 'Modo claro';
  }
}

// ====== VIEWS ======
function setView(v) {
  state.currentView = v;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.view===v));
  const sel = document.getElementById('selector');
  if (['turmas','profs','salas'].includes(v)) {
    sel.classList.remove('hidden');
    let items = [];
    if (v==='turmas') items = currentData().turmas;
    else if (v==='profs') items = currentData().profs;
    else items = currentData().salas;
    sel.innerHTML = items.map(i => `<option>${i}</option>`).join('');
  } else sel.classList.add('hidden');

  const titles = {
    dashboard: ['Dashboard', 'Visão geral do sistema'],
    turmas: ['Por Turma', 'Grade horária da turma'],
    profs: ['Por Professor', 'Agenda individual do professor'],
    salas: ['Por Sala', 'Ocupação dos espaços'],
    completo: ['Quadro Completo', 'Todas as turmas lado a lado'],
    regras: ['Regras & Configurações', 'Edite planejamento, áreas, salas'],
    auditoria: ['Auditoria', 'Conflitos e validações']
  };
  document.getElementById('viewTitle').textContent = titles[v][0];
  document.getElementById('viewSubtitle').textContent = titles[v][1];
  render();
}

function render() {
  const v = state.currentView;
  let html = '';
  if (v==='dashboard') html = renderDashboard();
  else if (v==='turmas') html = renderTurma(document.getElementById('selector').value);
  else if (v==='profs') html = renderProf(document.getElementById('selector').value);
  else if (v==='salas') html = renderSala(document.getElementById('selector').value);
  else if (v==='completo') html = renderCompleto();
  else if (v==='regras') html = renderRegras();
  else if (v==='auditoria') html = renderAuditoria();
  document.getElementById('content').innerHTML = html;
  if (window.lucide) lucide.createIcons();
}

// ====== CELL RENDER ======
function cellHTML(slot, opts={}) {
  if (!slot) return '<td class="text-surface-500 text-center text-xs">—</td>';
  const area = getArea(slot.disc);
  const edit = document.getElementById('editMode')?.checked;
  const onclick = edit ? `onclick="openEdit('${slot.dia}',${slot.aula},'${slot.turma.replace(/'/g,"\\'")}')"` : '';
  const cls = edit ? 'editable' : '';
  return `<td class="grid-cell area-${area} ${cls}" ${onclick}>
    <div class="px-2 py-2">
      ${opts.hideProf ? '' : `<div class="font-bold text-xs leading-tight">${slot.prof}</div>`}
      <div class="text-[11px] leading-tight mt-0.5 text-surface-300">${slot.disc}</div>
      ${opts.hideSala ? '' : `<div class="text-[10px] text-surface-400 mt-0.5">📍 ${slot.sala}</div>`}
      ${opts.extra || ''}
    </div></td>`;
}

function kpiCard(icon, label, value, color) {
  return `<div class="glass rounded-xl p-4 stat-card">
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs text-surface-400 uppercase tracking-wide">${label}</span>
      <i data-lucide="${icon}" class="ico text-${color}"></i>
    </div>
    <div class="text-3xl font-bold">${value}</div>
  </div>`;
}

function countIsoladas() {
  const d = currentData();
  let cnt = 0;
  for (const turma of d.turmas) {
    for (const dia of d.dias) {
      let cur = null;
      for (let a = 1; a <= 9; a++) {
        if (dia==='Quarta' && a >= 8) {
          if (cur && cur.count===1) cnt++;
          cur = null; continue;
        }
        const sl = getSlot(dia, a, turma);
        if (sl) {
          if (cur && cur.prof===sl.prof && cur.disc===sl.disc) cur.count++;
          else {
            if (cur && cur.count===1) cnt++;
            cur = {prof:sl.prof, disc:sl.disc, count:1};
          }
        } else {
          if (cur && cur.count===1) cnt++;
          cur = null;
        }
      }
      if (cur && cur.count===1) cnt++;
    }
  }
  return cnt;
}

  html += `<div class="glass rounded-xl p-5 lg:col-span-2">
    <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="sliders" class="ico text-primary-500"></i> Configurações Gerais</h3>
    <div class="grid md:grid-cols-2 gap-4 text-sm">
      <label class="block">
        <span class="text-xs text-surface-400">Nome da escola</span>
        <input value="${state.schools[state.currentSchoolId].name}" onchange="renameSchool(this.value)" class="w-full bg-surface-800 px-3 py-2 rounded mt-1 border border-white/10">
      </label>
      <label class="block">
        <span class="text-xs text-surface-400">Turmas (lista, separada por vírgula)</span>
        <input value="${d.turmas.join(', ')}" onchange="updateTurmas(this.value)" class="w-full bg-surface-800 px-3 py-2 rounded mt-1 border border-white/10">
      </label>
      <label class="block">
        <span class="text-xs text-surface-400">Professores</span>
        <textarea onchange="updateProfs(this.value)" class="w-full bg-surface-800 px-3 py-2 rounded mt-1 border border-white/10 h-20">${d.profs.join(', ')}</textarea>
      </label>
      <label class="block">
        <span class="text-xs text-surface-400">Dias da semana</span>
        <input value="${d.dias.join(', ')}" onchange="updateDias(this.value)" class="w-full bg-surface-800 px-3 py-2 rounded mt-1 border border-white/10">
      </label>
    </div>
    <div class="mt-4 text-xs text-surface-400">
      💡 Mudanças nas listas afetam apenas opções disponíveis. Slots existentes mantidos.
    </div>
  </div>`;

  html += '</div>';
  return html;
}

// ====== AUDITORIA ======
function renderAuditoria() {
  const conflicts = detectConflicts();
  const iso = countIsoladas();
  const d = currentData();
  // CH por prof
  const chProf = {};
  d.slots.forEach(s => chProf[s.prof] = (chProf[s.prof]||0)+1);

  let html = `<div class="grid md:grid-cols-3 gap-4 mb-6">
    ${kpiCard('alert-triangle','Conflitos', conflicts.length, conflicts.length===0?'green-400':'red-400')}
    ${kpiCard('split','Isoladas', iso, 'amber-400')}
    ${kpiCard('check-circle-2','Status', conflicts.length===0?'OK':'⚠️', conflicts.length===0?'green-400':'red-400')}
  </div>`;

  html += `<div class="glass rounded-xl p-5 mb-4">
    <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="shield-alert" class="ico"></i> Conflitos Detectados</h3>`;
  if (conflicts.length===0) {
    html += `<div class="flex items-center gap-2 text-green-400"><i data-lucide="check-circle-2" class="ico"></i> Nenhum conflito.</div>`;
  } else {
    html += `<div class="space-y-2 text-sm">${conflicts.map(c=>{
      if (c.type==='prof') return `<div class="bg-red-500/10 border border-red-500/20 rounded p-2 flex items-center gap-2">
        <i data-lucide="user-x" class="ico text-red-400"></i>
        <div><strong>${c.slots[0].prof}</strong> em ${c.slots.length} turmas simultaneamente: ${c.slots.map(s=>s.turma).join(', ')} (${c.slots[0].dia} A${c.slots[0].aula})</div></div>`;
      return `<div class="bg-amber-500/10 border border-amber-500/20 rounded p-2 flex items-center gap-2">
        <i data-lucide="calendar-x" class="ico text-amber-400"></i>
        <div><strong>${c.slot.prof}</strong> em planejamento pedagógico: ${c.slot.dia} A${c.slot.aula} (${c.slot.turma} / ${c.slot.disc})</div></div>`;
    }).join('')}</div>`;
  }
  html += `</div>`;

  // CH detail
  html += `<div class="glass rounded-xl p-5">
    <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="bar-chart-3" class="ico"></i> Carga Horária por Professor</h3>
    <div class="grid md:grid-cols-2 gap-2">
      ${Object.entries(chProf).sort((a,b)=>b[1]-a[1]).map(([p,c])=>`
        <div class="flex items-center justify-between bg-surface-900/50 rounded p-2 text-sm">
          <span class="font-medium">${p}</span>
          <span class="badge bg-primary-500/20 text-primary-500">${c} aulas</span>
        </div>`).join('')}
    </div>
  </div>`;
  return html;
}

// ====== EDIT MODAL ======
function openEdit(dia, aula, turma) {
  const d = currentData();
  let slot = getSlot(dia, parseInt(aula), turma);
  if (!slot) {
    slot = {dia, aula:parseInt(aula), turma, prof:d.profs[0], disc:'', sala:d.salas[0]};
    d.slots.push(slot);
  }
  state.editingSlot = slot;
  document.getElementById('editSlotInfo').textContent = `${turma} · ${dia} · Aula ${aula} (${HORARIOS[aula]})`;
  document.getElementById('editProf').innerHTML = d.profs.map(p=>`<option ${p===slot.prof?'selected':''}>${p}</option>`).join('');
  document.getElementById('editDisc').value = slot.disc;
  document.getElementById('editSala').innerHTML = d.salas.map(s=>`<option ${s===slot.sala?'selected':''}>${s}</option>`).join('');
  document.getElementById('editConflicts').innerHTML = '';
  document.getElementById('editModal').classList.remove('hidden');
  // Real-time conflict check
  document.getElementById('editProf').onchange = checkEditConflicts;
  checkEditConflicts();
}
function checkEditConflicts() {
  const prof = document.getElementById('editProf').value;
  const slot = state.editingSlot;
  const warnings = [];
  if (isPlanningOff(prof, slot.dia, slot.aula)) warnings.push(`⚠️ ${prof} está em planejamento ${slot.dia} A${slot.aula}`);
  if (isProfBusyElsewhere(prof, slot.dia, slot.aula, slot.turma)) warnings.push(`⚠️ ${prof} já tem aula em outra turma neste slot`);
  document.getElementById('editConflicts').innerHTML = warnings.length===0
    ? '<span class="text-green-400 text-xs">✓ Sem conflitos</span>'
    : warnings.map(w=>`<div class="text-red-300">${w}</div>`).join('');
}
function closeEdit() { document.getElementById('editModal').classList.add('hidden'); state.editingSlot = null; }
function saveEdit() {
  if (!state.editingSlot) return;
  state.editingSlot.prof = document.getElementById('editProf').value;
  state.editingSlot.disc = document.getElementById('editDisc').value;
  state.editingSlot.sala = document.getElementById('editSala').value;
  saveToStorage();
  closeEdit(); render(); toast('Slot atualizado');
}
function clearSlot() {
  if (!state.editingSlot) return;
  const d = currentData();
  d.slots = d.slots.filter(s=>s!==state.editingSlot);
  saveToStorage();
  closeEdit(); render(); toast('Slot removido');
}

// ====== EDIT RULES ======
function addPlanejamento(dia) {
  const d = currentData();
  const prof = prompt('Nome do professor:');
  if (!prof) return;
  d.planejamento[dia].push({prof, periodo:'all'});
  saveToStorage(); render();
}
function removePlanejamento(dia, idx) {
  currentData().planejamento[dia].splice(idx, 1);
  saveToStorage(); render();
}
function updatePlanPeriod(dia, idx, periodo) {
  currentData().planejamento[dia][idx].periodo = periodo;
  saveToStorage();
}
function addDiscArea(area, disc) {
  if (!disc) return;
  currentData().areas[area].push(disc.trim());
  rebuildAreaMap();
  saveToStorage(); render();
}
function removeDiscArea(area, idx) {
  currentData().areas[area].splice(idx, 1);
  rebuildAreaMap();
  saveToStorage(); render();
}
function addSala() {
  const name = prompt('Nome da sala:');
  if (!name) return;
  currentData().salas.push(name);
  saveToStorage(); render();
}
function updateSala(idx, val) {
  currentData().salas[idx] = val;
  saveToStorage();
}
function removeSala(idx) {
  currentData().salas.splice(idx, 1);
  saveToStorage(); render();
}
function renameSchool(name) {
  state.schools[state.currentSchoolId].name = name;
  saveToStorage(); populateSchoolSelect();
}
function updateTurmas(val) {
  currentData().turmas = val.split(',').map(s=>s.trim()).filter(Boolean);
  saveToStorage();
}
function updateProfs(val) {
  currentData().profs = val.split(',').map(s=>s.trim()).filter(Boolean);
  saveToStorage();
}
function updateDias(val) {
  currentData().dias = val.split(',').map(s=>s.trim()).filter(Boolean);
  saveToStorage();
}

// ====== EXPORT ======
function exportPDF() {
  const el = document.getElementById('content');
  toast('Gerando PDF...');
  html2pdf().set({
    margin: 8,
    filename: `horario_${state.currentView}_${Date.now()}.pdf`,
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, backgroundColor: state.theme==='dark'?'#09090b':'#fff' },
    jsPDF: { unit: 'mm', format: 'a3', orientation: 'landscape' }
  }).from(el).save();
}
function exportXLSX() {
  const wb = XLSX.utils.book_new();
  const d = currentData();
  for (const turma of d.turmas) {
    const aoa = [['Aula','Horário', ...d.dias]];
    for (let a=1; a<=9; a++) {
      const row = [`A${a}`, HORARIOS[a]||''];
      for (const dia of d.dias) {
        if (dia==='Quarta' && a >= 8) { row.push('CLUBES'); continue; }
        const s = getSlot(dia, a, turma);
        row.push(s?`${s.prof}\n${s.disc}\n${s.sala}`:'—');
      }
      aoa.push(row);
    }
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    XLSX.utils.book_append_sheet(wb, ws, turma.substring(0,30).replace(/[\\/?*\[\]]/g,''));
  }
  // Profs
  const chProf = {}; d.slots.forEach(s => chProf[s.prof] = (chProf[s.prof]||0)+1);
  const profsAoa = [['Professor','Aulas/sem']];
  Object.entries(chProf).sort((a,b)=>b[1]-a[1]).forEach(([p,c])=>profsAoa.push([p,c]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(profsAoa), 'Carga Profs');
  XLSX.writeFile(wb, `horario_${state.schools[state.currentSchoolId].name.replace(/\s/g,'_')}_${Date.now()}.xlsx`);
  toast('Excel exportado');
}
function saveJSON() {
  const blob = new Blob([JSON.stringify({schools:state.schools, current:state.currentSchoolId}, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `horario_escolar_backup_${Date.now()}.json`; a.click();
  URL.revokeObjectURL(url);
  toast('JSON salvo');
}
function loadJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const obj = JSON.parse(ev.target.result);
      if (obj.schools) {
        state.schools = obj.schools;
        state.currentSchoolId = obj.current || Object.keys(obj.schools)[0];
      } else if (obj.slots) {
        // single-school old format
        const id = 'imported_' + Date.now();
        state.schools[id] = {name: 'Importada ' + new Date().toLocaleDateString(), data: obj};
        state.currentSchoolId = id;
      }
      saveToStorage(); populateSchoolSelect(); rebuildAreaMap(); render();
      toast('Dados importados');
    } catch(err) { alert('Erro: ' + err.message); }
  };
  reader.readAsText(file);
}

// ====== SYNC (Cloud) ======
function openSyncModal() {
  document.getElementById('syncModal').classList.remove('hidden');
  const saved = localStorage.getItem('horario_escolar_sync_email');
  if (saved) document.getElementById('syncEmail').value = saved;
}
function closeSyncModal() {
  document.getElementById('syncModal').classList.add('hidden');
  document.getElementById('syncStatus').textContent = '';
}
async function syncToCloud() {
  const email = document.getElementById('syncEmail').value.trim();
  const server = document.getElementById('syncServer').value.trim();
  const status = document.getElementById('syncStatus');

  if (!email || !server) {
    status.textContent = '❌ Email e URL obrigatórios';
    return;
  }

  status.textContent = '⏳ Salvando...';
  try {
    const d = currentData();
    const response = await fetch(`${server}/api/save-grade`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email,
        schoolName: state.schools[state.currentSchoolId].name,
        gradeData: d
      })
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const result = await response.json();

    localStorage.setItem('horario_escolar_sync_email', email);
    localStorage.setItem('horario_escolar_sync_server', server);
    status.textContent = '✅ Salvo na nuvem';
    setTimeout(() => closeSyncModal(), 1500);
    toast('Sincronizado');
  } catch(e) {
    status.textContent = `❌ ${e.message}`;
  }
}
async function syncFromCloud() {
  const email = document.getElementById('syncEmail').value.trim();
  const server = document.getElementById('syncServer').value.trim();
  const status = document.getElementById('syncStatus');

  if (!email || !server) {
    status.textContent = '❌ Email e URL obrigatórios';
    return;
  }

  status.textContent = '⏳ Carregando...';
  try {
    const schoolName = state.schools[state.currentSchoolId].name;
    const response = await fetch(`${server}/api/load-grade?email=${encodeURIComponent(email)}&schoolName=${encodeURIComponent(schoolName)}`);

    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const result = await response.json();

    state.schools[state.currentSchoolId].data = result.gradeData;
    saveToStorage();
    rebuildAreaMap();
    render();

    status.textContent = '✅ Carregado';
    setTimeout(() => closeSyncModal(), 1500);
    toast('Dados atualizados');
  } catch(e) {
    status.textContent = `❌ ${e.message}`;
  }
}

// ====== INIT ======
loadFromStorage();
bootSchool();
applyTheme();
populateSchoolSelect();
setView('dashboard');
if (window.lucide) lucide.createIcons();
